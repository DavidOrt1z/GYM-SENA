<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Globo/Mundo para Idiomas -->
  <g transform="translate(100, 100)">
    <!-- Círculo principal del globo -->
    <circle cx="0" cy="0" r="45" fill="#4CAF50" opacity="0.2" stroke="#4CAF50" stroke-width="2"/>
    
    <!-- Líneas de latitud -->
    <ellipse cx="0" cy="0" rx="45" ry="15" fill="none" stroke="#4CAF50" stroke-width="1.5" opacity="0.6"/>
    <ellipse cx="0" cy="-15" rx="42" ry="10" fill="none" stroke="#4CAF50" stroke-width="1.5" opacity="0.4"/>
    <ellipse cx="0" cy="15" rx="42" ry="10" fill="none" stroke="#4CAF50" stroke-width="1.5" opacity="0.4"/>
    
    <!-- Líneas de longitud -->
    <line x1="0" y1="-45" x2="0" y2="45" stroke="#4CAF50" stroke-width="1.5" opacity="0.6"/>
    <path d="M -30,-30 Q 0,-45 30,-30" stroke="#4CAF50" stroke-width="1.5" fill="none" opacity="0.4"/>
    <path d="M -30,30 Q 0,45 30,30" stroke="#4CAF50" stroke-width="1.5" fill="none" opacity="0.4"/>
    
    <!-- Continentes simplificados -->
    <circle cx="-20" cy="-10" r="5" fill="#4CAF50" opacity="0.8"/>
    <circle cx="15" cy="20" r="6" fill="#4CAF50" opacity="0.8"/>
    <path d="M 25,-5 L 30,-2 L 28,5 L 20,3 Z" fill="#4CAF50" opacity="0.8"/>
    
    <!-- Pequeño punto polar -->
    <circle cx="0" cy="-45" r="3" fill="#4CAF50"/>
  </g>
</svg>