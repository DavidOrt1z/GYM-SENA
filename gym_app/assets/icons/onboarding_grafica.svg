<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Chart/Graph -->
  <g transform="translate(100, 100)">
    <!-- Axes -->
    <line x1="-50" y1="40" x2="50" y2="40" stroke="#00BCD4" stroke-width="3"/>
    <line x1="-50" y1="40" x2="-50" y2="-50" stroke="#00BCD4" stroke-width="3"/>
    
    <!-- Grid lines -->
    <line x1="-50" y1="20" x2="50" y2="20" stroke="#00BCD4" stroke-width="1" opacity="0.3"/>
    <line x1="-50" y1="0" x2="50" y2="0" stroke="#00BCD4" stroke-width="1" opacity="0.3"/>
    <line x1="-50" y1="-20" x2="50" y2="-20" stroke="#00BCD4" stroke-width="1" opacity="0.3"/>
    <line x1="-30" y1="40" x2="-30" y2="-50" stroke="#00BCD4" stroke-width="1" opacity="0.3"/>
    <line x1="0" y1="40" x2="0" y2="-50" stroke="#00BCD4" stroke-width="1" opacity="0.3"/>
    <line x1="30" y1="40" x2="30" y2="-50" stroke="#00BCD4" stroke-width="1" opacity="0.3"/>
    
    <!-- Line chart (upward trend) -->
    <polyline points="-40,10 -20,-10 0,-25 20,-15 40,-30" 
              stroke="#00BCD4" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Data points -->
    <circle cx="-40" cy="10" r="4" fill="#00BCD4"/>
    <circle cx="-20" cy="-10" r="4" fill="#00BCD4"/>
    <circle cx="0" cy="-25" r="4" fill="#00BCD4"/>
    <circle cx="20" cy="-15" r="4" fill="#00BCD4"/>
    <circle cx="40" cy="-30" r="4" fill="#00BCD4"/>
    
    <!-- Area under curve -->
    <polygon points="-40,10 -20,-10 0,-25 20,-15 40,-30 40,40 -40,40" 
             fill="#00BCD4" opacity="0.1"/>
  </g>
</svg>