<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Calendar -->
  <g transform="translate(100, 100)">
    <!-- Main calendar box -->
    <rect x="-55" y="-60" width="110" height="110" rx="8" fill="none" stroke="#2196F3" stroke-width="3"/>
    
    <!-- Top bar -->
    <rect x="-55" y="-60" width="110" height="20" rx="8" fill="#2196F3" opacity="0.2"/>
    
    <!-- Header line -->
    <line x1="-55" y1="-40" x2="55" y2="-40" stroke="#2196F3" stroke-width="2" opacity="0.5"/>
    
    <!-- Calendar holes -->
    <circle cx="-35" cy="-50" r="3" fill="#2196F3"/>
    <circle cx="35" cy="-50" r="3" fill="#2196F3"/>
    
    <!-- Days grid -->
    <line x1="-55" y1="-20" x2="55" y2="-20" stroke="#2196F3" stroke-width="1" opacity="0.3"/>
    <line x1="-55" y1="0" x2="55" y2="0" stroke="#2196F3" stroke-width="1" opacity="0.3"/>
    <line x1="-55" y1="20" x2="55" y2="20" stroke="#2196F3" stroke-width="1" opacity="0.3"/>
    
    <!-- Vertical lines -->
    <line x1="-20" y1="-40" x2="-20" y2="40" stroke="#2196F3" stroke-width="1" opacity="0.3"/>
    <line x1="0" y1="-40" x2="0" y2="40" stroke="#2196F3" stroke-width="1" opacity="0.3"/>
    <line x1="20" y1="-40" x2="20" y2="40" stroke="#2196F3" stroke-width="1" opacity="0.3"/>
    
    <!-- Highlighted date -->
    <rect x="20" y="0" width="18" height="18" rx="2" fill="#2196F3" opacity="0.6"/>
    <text x="29" y="12" font-size="12" fill="white" text-anchor="middle" font-weight="bold">15</text>
  </g>
</svg>