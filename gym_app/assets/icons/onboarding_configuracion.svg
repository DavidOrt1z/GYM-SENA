<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Settings/Gear icon -->
  <g transform="translate(100, 100)">
    <!-- Center circle -->
    <circle cx="0" cy="0" r="12" fill="#4CAF50"/>
    
    <!-- Gear teeth (12 teeth) -->
    <!-- Top -->
    <rect x="-6" y="-48" width="12" height="15" fill="#4CAF50" rx="2"/>
    <!-- Top-right (30°) -->
    <rect x="24" y="-36" width="15" height="12" fill="#4CAF50" rx="2" transform="rotate(30 31.5 -30)"/>
    <!-- Right (60°) -->
    <rect x="36" y="-6" width="15" height="12" fill="#4CAF50" rx="2" transform="rotate(60 43.5 0)"/>
    <!-- Bottom-right (90°) -->
    <rect x="24" y="24" width="15" height="12" fill="#4CAF50" rx="2" transform="rotate(90 31.5 30)"/>
    <!-- Bottom (120°) -->
    <rect x="-6" y="33" width="12" height="15" fill="#4CAF50" rx="2" transform="rotate(120 0 40.5)"/>
    <!-- Bottom-left (150°) -->
    <rect x="-39" y="24" width="15" height="12" fill="#4CAF50" rx="2" transform="rotate(150 -31.5 30)"/>
    <!-- Left (180°) -->
    <rect x="-51" y="-6" width="15" height="12" fill="#4CAF50" rx="2" transform="rotate(180 -43.5 0)"/>
    <!-- Top-left (210°) -->
    <rect x="-39" y="-36" width="15" height="12" fill="#4CAF50" rx="2" transform="rotate(210 -31.5 -30)"/>
    
    <!-- Inner circle -->
    <circle cx="0" cy="0" r="7" fill="white" opacity="0.3"/>
  </g>
</svg>