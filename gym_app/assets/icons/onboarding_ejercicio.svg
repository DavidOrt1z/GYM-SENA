<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Dumbbell -->
  <g transform="translate(100, 100)">
    <!-- Left weight -->
    <rect x="-70" y="-15" width="30" height="30" rx="3" fill="#1273D4" opacity="0.9"/>
    <rect x="-70" y="-15" width="30" height="30" rx="3" fill="none" stroke="#1273D4" stroke-width="1" opacity="0.5"/>
    
    <!-- Bar -->
    <rect x="-40" y="-8" width="80" height="16" rx="8" fill="#1273D4"/>
    
    <!-- Right weight -->
    <rect x="40" y="-15" width="30" height="30" rx="3" fill="#1273D4" opacity="0.9"/>
    <rect x="40" y="-15" width="30" height="30" rx="3" fill="none" stroke="#1273D4" stroke-width="1" opacity="0.5"/>
    
    <!-- Center grip detail -->
    <line x1="-15" y1="-10" x2="-15" y2="10" stroke="#1273D4" stroke-width="2" opacity="0.6"/>
    <line x1="-5" y1="-10" x2="-5" y2="10" stroke="#1273D4" stroke-width="2" opacity="0.6"/>
    <line x1="5" y1="-10" x2="5" y2="10" stroke="#1273D4" stroke-width="2" opacity="0.6"/>
    <line x1="15" y1="-10" x2="15" y2="10" stroke="#1273D4" stroke-width="2" opacity="0.6"/>
  </g>
</svg>